name: Update Steam Market prices

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-steam-market-prices
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update market prices
        run: node scripts/update-market-prices.mjs
        env:
          PRICE_FETCH_DELAY_MS: '2500'
          STEAM_CURRENCY: '8'

      - name: Commit updated prices
        run: |
          if git diff --quiet -- index.html; then
            echo "No price changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update Steam Market prices"
          git push
