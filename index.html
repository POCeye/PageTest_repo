[v];$('partFilter').appendChild(o)});['q','category','rarity','quality','classFilter','partFilter'].forEach(id=>$(id).addEventListener('input',renderCards));document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));$('workshopEquip').addEventListener('input',renderWorkshop);document.querySelectorAll('#usageFilters input').forEach(x=>x.addEventListener('change',renderCards));$('clear').addEventListener('click',()=>{$('q').value='';$('category').value='';$('rarity').value='';$('quality').value='';$('classFilter').value='';$('partFilter').value='';document.querySelectorAll('#usageFilters input').forEach(x=>x.checked=false);renderCards()});const priceSnapshotEl=$('priceSnapshot');if(priceSnapshotEl)priceSnapshotEl.textContent='\u88c5\u5099\u30fb\u7d20\u6750\u30c7\u30fc\u30bf: taskbarhero.wiki / \u4fa1\u683c\u60c5\u5831: Steam Community Market / \u4fa1\u683c\u53d6\u5f97: '+MARKET_PRICE_SNAPSHOT;renderLegend();renderCards();renderSources();renderWorkshopOptions();renderWorkshop();</script></body></html>
