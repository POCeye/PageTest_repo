const $=id=>document.getElementById(id);const uniq=a=>[...new Set(a.filter(Boolean))].sort((x,y)=>x.localeCompare(y,'ja'));function opt(id,vals){const e=$(id);vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;e.appendChild(o)})}opt('category',uniq(cards.map(c=>c.category)));opt('rarity',uniq(cards.map(c=>c.rarity)));opt('quality',uniq(cards.map(c=>c.quality)));function alltxt(c){return [c.name,c.category,c.rarity,c.quality,c.memo,c.sourceName,...c.usage,...c.effects.flat()].join(' ').toLowerCase()}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function color(r){return R[r]||'#64748b'}function render(){const q=$('q').value.trim().toLowerCase(),cat=$('category').value,rar=$('rarity').value,qual=$('quality').value,uses=[...document.querySelectorAll('#usageFilters input:checked')].map(x=>x.value);const f=cards.filter(c=>(!q||alltxt(c).includes(q))&&(!cat||c.category===cat)&&(!rar||c.rarity===rar)&&(!qual||c.quality===qual)&&(!uses.length||uses.some(u=>c.usage.includes(u))));$('stats').textContent=`表示 ${f.length} / 全 ${cards.length} 件（装飾31・彫刻27・巻物5・碑文25・補足4）`;$('cards').innerHTML=f.map(c=>`<article class="card" style="--rarity:${color(c.rarity)}"><div class="meta"><span class="badge">${esc(c.category)}</span><span class="badge rarity">${esc(c.rarity)}</span><span class="badge">${esc(c.quality)}</span>${c.usage.map(u=>`<span class="badge">${esc(u)}</span>`).join('')}</div><h2>${esc(c.name)}</h2>${c.effects.map(e=>`<div class="effect"><div class="effect-title">${esc(e[0])} <span class="small">${esc(e[1])}</span></div><div>${esc(e[2])}</div></div>`).join('')}<div class="memo">${esc(c.memo)}</div><div class="src">出典: <a href="${esc(c.sourceUrl)}" target="_blank" rel="noopener noreferrer">${esc(c.sourceName)}</a></div></article>`).join('')||'<div class="card">該当なし</div>'}function renderSources(){$('sources').innerHTML=sources.map(s=>`<div class="source-row"><strong
