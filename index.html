const $=id=>document.getElementById(id);const uniq=a=>[...new Set(a.filter(Boolean))].sort((x,y)=>x.localeCompare(y,'ja'));function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function color(r){return R[r]||'#64748b'}function opt(id,vals){const e=$(id);vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;e.appendChild(o)})}function alltxt(c){return [c.name,c.category,c.rarity,c.quality,c.memo,c.sourceName,...c.usage,...c.effects.flat()].join(' ').toLowerCase()}function iconHtml(c){const icon=ICONS[c.name];const market=marketUrl(c);if(!icon)return '';const img=`<img class="item-icon" src="${esc(icon)}" alt="${esc(c.name)}">`;return market?`<a href="${esc(market)}" target="_blank" rel="noopener noreferrer">${img}</a>`:img}function marketHtml(c){const market=marketUrl(c);if(!market)return '';const price=MARKET_PRICES[c.name]||'None';return `<div class="card-links"><span class="market-price">最低価格: ${esc(price)}</span><a class="market-link" href="${esc(market)}" target="_blank" rel="noopener noreferrer">Steam Marketで見る</a></div>`}function renderCards(){const q=$('q').value.trim().toLowerCase(),cat=$('category').value,rar=$('rarity').value,qual=$('quality').value,uses=[...document.querySelectorAll('#usageFilters input:checked')].map(x=>x.value);const f=cards.filter(c=>(!q||alltxt(c).includes(q))&&(!cat||c.category===cat)&&(!rar||c.rarity===rar)&&(!qual||c.quality===qual)&&(!uses.length||uses.some(u=>c.usage.includes(u))));$('stats').textContent=`表示 ${f.length} / 全 ${cards.length} 件（装飾31・彫刻27・刻印5・装備/補足10）`;$('cards').innerHTML=f.map(cardHtml).join('')||'<div class="card">該当なし</div>'}function cardHtml(c){return `<article class="card" style="--rarity:${color(c.rarity)}"><div class="meta"><span class="badge">${esc(c.category)}</span><span class="badge rarity">${esc(c.rarity)}</span><span class="badge">${esc(c.quality)}</span>${c.usage.map(u=>`<span class="badge">${esc(u)}</span>`).join('')}</div><div class="title-row">${iconHtml(c)}<h2>${esc(c.name)}</h2></div>${c.effects.map(e=>`<div class="effect"><div class="effect-title">${esc(e[0])} <span class="small">${esc(e[1])}</span></div><div>${esc(e[2])}</div></div>`).join('')}${marketHtml(c)}<div class="src">出典: <a href="${esc(c.sourceUrl)}" target="_blank" rel="noopener noreferrer">${esc(c.sourceName)}</a></div></article>`}function renderSources(){$('sources').innerHTML=sources.map(s=>`<div class="source-row"><strong>${esc(s[0])} / ${esc(s[1])}</strong><div class="small">${esc(s[3])}</div><div class="src"><a href="${esc(s[2])}" target="_blank" rel="noopener noreferrer">${esc(s[2])}</a></div></div>`).join('')}function renderLegend(){const order=['コモン','アンコモン','レア','レジェンダリー','イモータル','アルカナ','ビヨンド','セレスティアル','複数','全般'];$('legend').innerHTML=order.map(r=>`<span><i class="dot" style="--c:${color(r)}"></i>${r}</span>`).join('')}opt('category',uniq(cards.map(c=>c.category)));opt('rarity',uniq(cards.map(c=>c.rarity)));opt('quality',uniq(cards.map(c=>c.quality)));['q','category','rarity','quality'].forEach(id=>$(id).addEventListener('input',renderCards));document.querySelectorAll('#usageFilters input').forEach(x=>x.addEventListener('change',renderCards));$('clear').addEventListener('click',()=>{$('q').value='';$('category').value='';$('rarity').value='';$('quality').value='';document.querySelectorAll('#usageFilters input').forEach(x=>x.checked=false);renderCards()});renderLegend();renderCards();renderSources();</script></body></html>
